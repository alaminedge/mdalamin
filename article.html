<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article — mdalamin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0d0d0d; --ink2:#1a1a1a; --paper:#faf9f7; --paper2:#f2f0ec;
  --cream:#ede9e1; --gold:#c9a84c; --gold2:#b8973a; --gold3:#e8d5a3;
  --muted:#777265; --border:#e0dbd2; --border2:#ccc8bf;
  --accent:#1a3a5c; --accent2:#0f2540; --accent3:#2a5a8c;
  --error:#c0392b; --success:#2e7d52; --premium:#8b5e3c;
  --radius:4px; --radius-md:8px; --radius-lg:14px;
  --transition:0.3s cubic-bezier(0.4,0,0.2,1);
  --shadow:0 4px 20px rgba(0,0,0,0.08); --shadow-lg:0 12px 48px rgba(0,0,0,0.14);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--paper2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}

/* NAV */
nav{background:rgba(250,249,247,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-inner{max-width:1120px;margin:0 auto;padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:700;color:var(--ink);text-decoration:none;letter-spacing:-.01em}
.nav-logo em{font-style:italic;color:var(--accent)}
.nav-links{display:flex;gap:24px;list-style:none}
.nav-links a{color:var(--muted);text-decoration:none;font-size:0.8rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase;transition:color var(--transition)}
.nav-links a:hover{color:var(--ink)}
.nav-right{display:flex;align-items:center;gap:8px}
.btn{font-family:'DM Sans',sans-serif;font-size:0.76rem;font-weight:600;padding:8px 18px;border-radius:var(--radius);cursor:pointer;transition:all var(--transition);letter-spacing:.04em;text-transform:uppercase;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.btn-outline{background:transparent;border:1.5px solid var(--border2);color:var(--ink)}
.btn-outline:hover{border-color:var(--ink);background:var(--ink);color:var(--paper)}
.btn-solid{background:var(--ink);color:var(--paper);border:1.5px solid var(--ink)}
.btn-solid:hover{background:var(--accent);border-color:var(--accent)}
.user-chip{display:none;align-items:center;gap:8px}
.user-chip.show{display:flex}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.7rem;border:2px solid var(--accent3)}
.btn-signout{background:none;border:1px solid var(--border);color:var(--muted);font-size:0.68rem;font-weight:600;padding:5px 10px;border-radius:var(--radius);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all var(--transition);letter-spacing:.03em;text-transform:uppercase}
.btn-signout:hover{border-color:var(--error);color:var(--error)}

/* PROGRESS BAR */
.progress-bar{position:fixed;top:64px;left:0;width:0%;height:2.5px;background:linear-gradient(90deg,var(--gold),var(--accent));z-index:99;transition:width .1s linear}

/* ARTICLE LAYOUT */
.article-wrap{max-width:1120px;margin:0 auto;padding:52px 28px 80px;display:grid;grid-template-columns:1fr 280px;gap:64px;align-items:start}
.article-main{}

/* HEADER */
.art-breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:24px;font-size:0.72rem}
.art-breadcrumb a{color:var(--muted);text-decoration:none;transition:color .2s}
.art-breadcrumb a:hover{color:var(--accent)}
.art-breadcrumb span{color:var(--border2)}
.art-cat{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.art-cat::before{content:'';display:block;width:24px;height:1.5px;background:var(--accent)}
.art-title{font-family:'Playfair Display',serif;font-size:clamp(1.9rem,4vw,3rem);font-weight:900;line-height:1.15;letter-spacing:-.03em;margin-bottom:20px;color:var(--ink)}
.art-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.art-author-avatar{width:38px;height:38px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.78rem;flex-shrink:0}
.art-author-info{}
.art-author-name{font-weight:600;font-size:0.84rem;color:var(--ink)}
.art-date{font-size:0.72rem;color:var(--muted)}
.meta-badges{display:flex;gap:6px;margin-left:auto}
.badge-premium{display:inline-flex;align-items:center;gap:4px;font-size:0.68rem;font-weight:700;color:var(--gold);background:rgba(201,168,76,0.1);padding:4px 12px;border-radius:20px;border:1px solid rgba(201,168,76,0.25)}
.badge-free{display:inline-flex;align-items:center;gap:4px;font-size:0.68rem;font-weight:700;color:var(--success);background:rgba(46,125,82,0.08);padding:4px 12px;border-radius:20px;border:1px solid rgba(46,125,82,0.2)}
.badge-archived{display:inline-flex;align-items:center;gap:4px;font-size:0.68rem;font-weight:600;color:var(--muted);background:var(--cream);padding:4px 12px;border-radius:20px;border:1px solid var(--border)}

/* FEATURED IMAGE */
.art-hero-img{width:100%;max-height:480px;object-fit:cover;border-radius:var(--radius-md);margin-bottom:36px;border:1px solid var(--border);display:block}

/* BODY */
.art-body{font-size:1.05rem;line-height:1.88;color:#2a2a2a;font-weight:300}
.art-body h1,.art-body h2{font-family:'Playfair Display',serif;font-weight:700;margin:2.2em 0 .8em;line-height:1.25;color:var(--ink);letter-spacing:-.02em}
.art-body h2{font-size:1.65rem}
.art-body h3{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;margin:1.8em 0 .6em;color:var(--ink)}
.art-body p{margin-bottom:1.4em}
.art-body img{max-width:100%;height:auto;border-radius:var(--radius-md);margin:1.5em 0;border:1px solid var(--border);display:block}
.art-body strong{font-weight:600;color:var(--ink)}
.art-body em{font-style:italic}
.art-body a{color:var(--accent);text-decoration:underline;text-underline-offset:3px}
.art-body blockquote{border-left:3px solid var(--gold);padding:12px 20px;margin:1.8em 0;background:var(--cream);border-radius:0 var(--radius) var(--radius) 0;font-style:italic;color:var(--muted)}
.art-body ul,.art-body ol{padding-left:26px;margin-bottom:1.4em}
.art-body li{margin-bottom:6px}
.art-body code{background:var(--cream);padding:2px 7px;border-radius:3px;font-size:.88em;font-family:'DM Mono',monospace;color:var(--accent)}
.art-body pre{background:#141414;color:#e8e8e8;padding:22px 24px;border-radius:var(--radius-md);overflow-x:auto;margin:1.5em 0;font-size:0.84rem;line-height:1.65;font-family:'DM Mono',monospace}
.art-body pre code{background:none;padding:0;color:inherit;font-size:inherit}
.art-body table{width:100%;border-collapse:collapse;margin:1.5em 0;font-size:.9rem}
.art-body th{background:var(--cream);padding:10px 14px;text-align:left;font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--border)}
.art-body td{padding:10px 14px;border-bottom:1px solid var(--border)}
.art-body hr{border:none;border-top:1px solid var(--border);margin:2.5em 0}

/* SHARE BAR */
.share-bar{display:flex;align-items:center;gap:10px;padding:20px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-top:40px}
.share-label{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-right:4px}
.share-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all var(--transition)}
.share-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(26,58,92,0.04)}
.copy-link{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:none;font-size:.74rem;font-weight:600;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all var(--transition);letter-spacing:.04em;text-transform:uppercase}
.copy-link:hover{border-color:var(--accent);color:var(--accent)}

/* SIDEBAR */
.sidebar{}
.sidebar-sticky{position:sticky;top:86px;display:flex;flex-direction:column;gap:24px}
.sidebar-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden}
.sidebar-card-head{padding:14px 18px;border-bottom:1px solid var(--border);font-size:0.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
.sidebar-card-body{padding:16px 18px}
.plan-item{padding:12px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.plan-item:last-child{border-bottom:none}
.pi-name{font-weight:600;font-size:.82rem}
.pi-price{font-family:'Playfair Display',serif;font-weight:700;font-size:.9rem;color:var(--gold)}
.pi-desc{font-size:.68rem;color:var(--muted);margin-top:2px}
.sidebar-upgrade-btn{display:block;width:100%;padding:11px;background:var(--ink);color:#fff;border:none;border-radius:var(--radius);font-family:'Playfair Display',serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all var(--transition);text-align:center;margin-top:14px;letter-spacing:.02em}
.sidebar-upgrade-btn:hover{background:var(--accent);transform:translateY(-1px);box-shadow:0 4px 16px rgba(26,58,92,0.2)}

/* GATE */
.gate-wrap{padding:64px 28px;max-width:600px;margin:0 auto;text-align:center}
.gate-icon{width:60px;height:60px;border-radius:50%;background:var(--cream);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;color:var(--muted)}
.gate-wrap h2{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;margin-bottom:10px;letter-spacing:-.02em}
.gate-wrap p{color:var(--muted);font-size:.9rem;line-height:1.6;margin-bottom:28px}
.gate-plans{display:flex;flex-direction:column;gap:10px;text-align:left;margin-bottom:24px;max-width:420px;margin-left:auto;margin-right:auto}
.gp-card{border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.gp-card-left h5{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700}
.gp-card-left p{font-size:.72rem;color:var(--muted);margin-top:2px}
.gp-price{font-family:'Playfair Display',serif;font-weight:700;color:var(--gold);font-size:1rem}
.btn-gate{display:inline-block;padding:13px 36px;background:var(--ink);color:#fff;border:none;border-radius:var(--radius);font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all var(--transition);letter-spacing:.02em;text-decoration:none}
.btn-gate:hover{background:var(--accent);transform:translateY(-1px)}
.btn-gate-gold{background:var(--gold);color:#fff}
.btn-gate-gold:hover{background:var(--gold2)}

/* LOADING */
.loading{text-align:center;padding:100px 28px}
.loading-ring{width:40px;height:40px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 18px}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(13,13,13,0.65);z-index:300;display:none;place-items:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:grid}
.modal{background:var(--paper);border-radius:var(--radius-lg);width:100%;max-width:420px;position:relative;overflow:hidden;animation:slideUp .3s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-header{padding:26px 26px 0}
.modal-header h3{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:4px}
.modal-header p{font-size:.8rem;color:var(--muted)}
.modal-body{padding:18px 26px 26px}
.modal-close{position:absolute;top:14px;right:14px;background:var(--cream);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all var(--transition)}
.modal-close:hover{background:var(--border2);color:var(--ink)}
.form-group{margin-bottom:13px}
.form-label{display:block;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px}
.form-input{width:100%;padding:10px 13px;background:var(--paper2);border:1.5px solid var(--border);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--ink);outline:none;transition:all var(--transition)}
.form-input:focus{background:var(--paper);border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,58,92,0.07)}
.btn-submit{width:100%;padding:12px;background:var(--ink);color:#fff;border:none;border-radius:var(--radius);font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all var(--transition)}
.btn-submit:hover{background:var(--accent)}
.form-switch{text-align:center;margin-top:12px;font-size:.76rem;color:var(--muted)}
.form-switch a{color:var(--accent);cursor:pointer;font-weight:600}
.alert{padding:10px 13px;border-radius:var(--radius);font-size:.76rem;margin-bottom:12px;display:none}
.alert.show{display:block}
.alert-error{background:#fef2f2;border:1px solid #fecaca;color:var(--error)}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px}

/* FOOTER */
footer{background:var(--ink);color:var(--paper);padding:40px 28px}
.footer-inner{max-width:1120px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px;margin-bottom:24px}
.footer-logo{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;text-decoration:none;color:#fff}
.footer-logo em{font-style:italic;color:var(--gold)}
.footer-nav{display:flex;gap:24px}
.footer-nav a{color:rgba(255,255,255,.45);text-decoration:none;font-size:.78rem;transition:color .2s}
.footer-nav a:hover{color:#fff}
.footer-bottom{max-width:1120px;margin:0 auto;border-top:1px solid rgba(255,255,255,.08);padding-top:20px;text-align:center;font-size:.7rem;color:rgba(255,255,255,.2)}

@media(max-width:900px){.article-wrap{grid-template-columns:1fr;gap:0}.sidebar{display:none}.nav-links{display:none}}
@media(max-width:600px){.article-wrap{padding:32px 16px 60px}.art-title{font-size:1.7rem}}
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">md<em>alamin</em></a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/#categoriesRow">Categories</a></li>
      <li><a href="/contact.html">Contact</a></li>
    </ul>
    <div class="nav-right">
      <div id="authBtns" style="display:flex;gap:8px">
        <button class="btn btn-outline" onclick="openLogin()">Sign In</button>
        <button class="btn btn-solid" onclick="openSignup()">Get Started</button>
      </div>
      <div class="user-chip" id="userChip">
        <div class="avatar" id="userAvatar">U</div>
        <span style="font-size:.8rem;font-weight:600;color:var(--ink)" id="userName"></span>
        <button class="btn-signout" onclick="logout()">Sign Out</button>
      </div>
    </div>
  </div>
</nav>

<div id="articleContent">
  <div class="loading">
    <div class="loading-ring"></div>
    <p style="color:var(--muted);font-size:.85rem">Loading article…</p>
  </div>
</div>

<!-- AUTH MODAL -->
<div class="modal-overlay" id="authModal" onclick="if(event.target===this)closeAuth()">
  <div class="modal">
    <button class="modal-close" onclick="closeAuth()"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    <div class="modal-header"><h3 id="authTitle">Welcome back</h3><p id="authSub">Sign in to continue reading</p></div>
    <div class="modal-body">
      <div class="alert" id="authAlert"></div>
      <div id="loginF">
        <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="loginEmail" placeholder="your@email.com"></div>
        <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="loginPassword" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <button class="btn-submit" onclick="doLogin()">Sign In</button>
        <p class="form-switch">No account? <a onclick="switchAuth('signup')">Create one free</a></p>
      </div>
      <div id="signupF" style="display:none">
        <div class="form-group"><label class="form-label">Name</label><input class="form-input" type="text" id="signupName" placeholder="Your name"></div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="signupEmail" placeholder="your@email.com"></div>
        <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="signupPassword" placeholder="Min. 6 characters" onkeydown="if(event.key==='Enter')doSignup()"></div>
        <button class="btn-submit" onclick="doSignup()">Create Free Account</button>
        <p class="form-switch">Have account? <a onclick="switchAuth('login')">Sign in</a></p>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <a href="/" class="footer-logo">md<em>alamin</em></a>
    <nav class="footer-nav">
      <a href="/">Home</a>
      <a href="/#categoriesRow">Categories</a>
      <a href="/contact.html">Contact</a>
    </nav>
  </div>
  <div class="footer-bottom">&copy; 2024 mdalamin. All rights reserved.</div>
</footer>

<script>
let token = localStorage.getItem('blog_token');
let currentUser = JSON.parse(localStorage.getItem('blog_user') || 'null');
const slug = new URLSearchParams(location.search).get('slug');
if (!slug) window.location.href = '/';

/* ─── INIT ─── */
function init() {
  if (currentUser) {
    document.getElementById('authBtns').style.display = 'none';
    document.getElementById('userChip').classList.add('show');
    document.getElementById('userName').textContent = currentUser.name;
    document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
  }
  loadArticle();
  window.addEventListener('scroll', updateProgress);
}

function updateProgress() {
  const doc = document.documentElement;
  const total = doc.scrollHeight - doc.clientHeight;
  const pct = total > 0 ? (doc.scrollTop / total) * 100 : 0;
  document.getElementById('progressBar').style.width = pct + '%';
}

/* ─── LOAD ─── */
async function loadArticle() {
  try {
    const headers = {};
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(`/api/blog/article/${slug}`, { headers });
    const article = await res.json();

    if (article.error) { showLoginGate(article.error); return; }
    if (article.locked) { showUpgradeGate(); return; }

    document.title = `${article.title} — mdalamin`;
    // Update meta
    const metaDesc = document.querySelector('meta[name="description"]') || document.createElement('meta');
    metaDesc.name = 'description'; metaDesc.content = article.excerpt || ''; document.head.appendChild(metaDesc);

    const authorInitial = (article.author_name || 'A').charAt(0).toUpperCase();
    const dateStr = article.published_at ? new Date(article.published_at).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) : '';
    const isPremium = article.is_premium;
    const isArchived = article.status === 'archived';

    document.getElementById('articleContent').innerHTML = `
      <div class="article-wrap">
        <article class="article-main">
          <div class="art-breadcrumb">
            <a href="/">Home</a>
            <span>›</span>
            ${article.category_name ? `<a href="/#categoriesRow">${esc(article.category_name)}</a><span>›</span>` : ''}
            <span style="color:var(--ink)">${esc(article.title.substring(0,40))}${article.title.length>40?'…':''}</span>
          </div>
          ${article.category_name ? `<div class="art-cat">${esc(article.category_name)}</div>` : ''}
          <h1 class="art-title">${esc(article.title)}</h1>
          <div class="art-meta">
            <div class="art-author-avatar">${authorInitial}</div>
            <div class="art-author-info">
              <div class="art-author-name">${esc(article.author_name || 'Admin')}</div>
              <div class="art-date">${dateStr}</div>
            </div>
            <div class="meta-badges">

          <div class="share-bar">

            </button>
            <button class="share-btn" onclick="shareFacebook()" title="Facebook">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </button>
            <button class="copy-link" onclick="copyLink()">Copy Link</button>

        </article>
        <aside class="sidebar">
          <div class="sidebar-sticky">
            <div class="sidebar-card">

                <div class="plan-item"><div><div class="pi-name">Monthly Max</div><div class="pi-desc">All premium ever</div></div><div class="pi-price">200 BDT</div></div>
                <div class="plan-item"><div><div class="pi-name">Yearly</div><div class="pi-desc">Best value</div></div><div class="pi-price">1200 BDT</div></div>

  } catch (e) { showLoginGate('Failed to load article.'); }
}

        <button class="btn-gate" onclick="openLogin()">Sign In</button>
        <button class="btn-gate btn-gate-gold" onclick="openSignup()">Create Free Account</button>

/* ─── SHARE ─── */
function shareTwitter() { window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent(document.title)}`,'_blank'); }
function shareFacebook() { window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}`,'_blank'); }
function copyLink() {
  navigator.clipboard.writeText(location.href).then(() => {
    const btn = document.querySelector('.copy-link');
    if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy Link', 1800); }
  });
}

/* ─── AUTH ─── */
function openLogin() { switchAuth('login'); document.getElementById('authModal').classList.add('open'); }
function openSignup() { switchAuth('signup'); document.getElementById('authModal').classList.add('open'); }
function closeAuth() { document.getElementById('authModal').classList.remove('open'); }
function switchAuth(t) {
  const isLogin = t === 'login';
  document.getElementById('authTitle').textContent = isLogin ? 'Welcome back' : 'Create your account';
  document.getElementById('authSub').textContent = isLogin ? 'Sign in to continue reading' : 'Free forever — no credit card';
  document.getElementById('loginF').style.display = isLogin ? 'block' : 'none';
  document.getElementById('signupF').style.display = isLogin ? 'none' : 'block';
  document.getElementById('authAlert').className = 'alert';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const alertEl = document.getElementById('authAlert');
  if (!email || !password) { alertEl.className='alert alert-error show'; alertEl.textContent='Please fill all fields'; return; }
  try {
    const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password}) });
    const data = await res.json();
    if (!res.ok) { alertEl.className='alert alert-error show'; alertEl.textContent=data.error; return; }
    token=data.token; currentUser=data.user;
    localStorage.setItem('blog_token',token); localStorage.setItem('blog_user',JSON.stringify(data.user));
    closeAuth(); location.reload();
  } catch { alertEl.className='alert alert-error show'; alertEl.textContent='Network error. Try again.'; }
}

async function doSignup() {
  const name=document.getElementById('signupName').value.trim();
  const email=document.getElementById('signupEmail').value.trim();
  const password=document.getElementById('signupPassword').value;
  const alertEl=document.getElementById('authAlert');
  if (!name||!email||!password) { alertEl.className='alert alert-error show'; alertEl.textContent='Please fill all fields'; return; }
  if (password.length < 6) { alertEl.className='alert alert-error show'; alertEl.textContent='Password must be 6+ characters'; return; }
  try {
    const res = await fetch('/api/auth/signup', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name,email,password}) });
    const data = await res.json();
    if (!res.ok) { alertEl.className='alert alert-error show'; alertEl.textContent=data.error; return; }
    token=data.token; currentUser=data.user;
    localStorage.setItem('blog_token',token); localStorage.setItem('blog_user',JSON.stringify(data.user));
    closeAuth(); location.reload();
  } catch { alertEl.className='alert alert-error show'; alertEl.textContent='Network error. Try again.'; }
}

function logout() { localStorage.clear(); token=null; currentUser=null; window.location.href='/'; }
function esc(s){ const d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; }
init();
</script>
