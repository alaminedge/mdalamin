<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search — mdalamin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Lexend:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fafafa; --surface:#fff; --surface2:#f5f5f5; --border:#e5e5e5;
  --accent:#2563eb; --accent2:#1d4ed8; --text:#171717; --muted:#737373;
  --radius:12px; --radius-sm:8px; --transition:0.25s cubic-bezier(0.4,0,0.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{background:rgba(255,255,255,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);
  padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Lexend',sans-serif;font-size:1.25rem;font-weight:800;letter-spacing:-0.03em;text-decoration:none;color:var(--text)}
.nav-logo span{color:var(--accent)}
.btn-back{padding:8px 16px;border:1.5px solid var(--border);border-radius:20px;font-size:0.8rem;font-weight:600;cursor:pointer;text-decoration:none;color:var(--muted);transition:all var(--transition)}
.btn-back:hover{border-color:var(--accent);color:var(--accent)}
.main{max-width:780px;margin:0 auto;padding:40px 24px}
.search-header{margin-bottom:32px}
.search-title{font-family:'Lexend',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:16px}
.search-input-wrap{display:flex;gap:10px}
.search-input{flex:1;padding:13px 18px;border:2px solid var(--border);border-radius:24px;font-family:'Inter',sans-serif;font-size:0.95rem;outline:none;transition:border-color var(--transition)}
.search-input:focus{border-color:var(--accent)}
.btn-search{padding:13px 24px;background:var(--accent);color:#fff;border:none;border-radius:24px;font-family:'Lexend',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all var(--transition)}
.btn-search:hover{background:var(--accent2)}
.results-list{display:flex;flex-direction:column;gap:16px}
.result-card{padding:18px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);transition:all var(--transition);text-decoration:none;color:var(--text);display:block}
.result-card:hover{border-color:var(--accent);transform:translateX(4px)}
.result-title{font-family:'Lexend',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:6px}
.result-excerpt{font-size:0.85rem;color:var(--muted);line-height:1.5}
.result-meta{font-size:0.75rem;color:var(--muted);margin-top:8px}
.empty{text-align:center;padding:60px;color:var(--muted)}
@media(max-width:600px){.search-input-wrap{flex-direction:column}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">md<span>alamin</span></a>
  <a href="/" class="btn-back">← Home</a>
</nav>
<div class="main">
  <div class="search-header">
    <h1 class="search-title">Search Articles</h1>
    <div class="search-input-wrap">
      <input class="search-input" type="text" id="searchInput" placeholder="Type to search..." onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn-search" onclick="doSearch()">Search</button>
    </div>
  </div>
  <div class="results-list" id="resultsList">
    <div class="empty">Start typing to search articles</div>
  </div>
</div>

<script>
async function doSearch(){
  const q = document.getElementById('searchInput').value.trim();
  const list = document.getElementById('resultsList');
  if(!q){ list.innerHTML = '<div class="empty">Start typing to search articles</div>'; return; }
  list.innerHTML = '<div class="empty"><div class="spinner" style="width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto"></div></div>';
  try{
    const res = await fetch(`/api/blog/search?q=${encodeURIComponent(q)}`);
    const articles = await res.json();
    if(!articles.length){ list.innerHTML = '<div class="empty">No articles found for "'+esc(q)+'"</div>'; return; }
    list.innerHTML = articles.map(a => `
      <a href="/article.html?slug=${a.slug}" class="result-card">
        <div class="result-title">${esc(a.title)}</div>
        <div class="result-excerpt">${esc((a.excerpt||'').substring(0,150))}</div>
        <div class="result-meta">${a.category_name ? esc(a.category_name)+' · ' : ''}${a.published_at ? new Date(a.published_at).toLocaleDateString() : ''}</div>
      </a>`).join('');
  }catch(e){ list.innerHTML = '<div class="empty">Search failed. Try again.</div>'; }
}
function esc(s){ const d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; }
</script>
</body>
</html>
